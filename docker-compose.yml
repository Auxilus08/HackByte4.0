version: "3.9"

services:
  # ─────────────────────────────────────────
  # PostgreSQL + PostGIS
  # ─────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: smartaccident_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartaccident}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartaccident_secret}
      POSTGRES_DB: ${POSTGRES_DB:-smartaccident_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartaccident} -d ${POSTGRES_DB:-smartaccident_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smartaccident_net

  # ─────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartaccident_backend
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && 
             python -c \"import sys; sys.path.insert(0,'..'); exec(open('../ml-model/train.py').read())\" 2>/dev/null || true &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir src"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smartaccident}:${POSTGRES_PASSWORD:-smartaccident_secret}@db:5432/${POSTGRES_DB:-smartaccident_db}
      APP_ENV: development
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      WEB3_PROVIDER_URL: ${WEB3_PROVIDER_URL:-}
      REWARD_CONTRACT_ADDRESS: ${REWARD_CONTRACT_ADDRESS:-}
      DEPLOYER_PRIVATE_KEY: ${DEPLOYER_PRIVATE_KEY:-}
      CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml-model:/ml-model:ro
      - /app/__pycache__
    depends_on:
      db:
        condition: service_healthy
    networks:
      - smartaccident_net

  # ─────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartaccident_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - smartaccident_net

# ─────────────────────────────────────────
# Named Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─────────────────────────────────────────
# Networks
# ─────────────────────────────────────────
networks:
  smartaccident_net:
    driver: bridge
